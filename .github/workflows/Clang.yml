name: Clang

on:
  push:
    branches: [ main, rewrite ]
  pull_request:

jobs:
  clang:
    strategy:
      fail-fast: false
      matrix:
        version: [21, 22]

    runs-on: ubuntu-latest

    container:
      image: ghcr.io/mattkretz/cplusplus-ci/clang${{ matrix.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Run test suite
        env:
          CXX: clang++
        run: make -j2 ci
